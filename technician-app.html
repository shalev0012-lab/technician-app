<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repair Manager</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase (upgrade to production SDK and host via HTTP server, not file://) -->
    <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-firestore-compat.js"></script>
</head>
<body style="margin: 0; padding: 0;">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // הגדרת האייקונים לשימוש ישיר מתוך Lucide CDN
        const Icon = ({ name, size = 24, color = "currentColor", strokeWidth = 2, fill="none", style }) => {
            useEffect(() => {
                lucide.createIcons();
            });
            return <i data-lucide={name} style={{ width: size, height: size, color, strokeWidth, fill, ...style }}></i>;
        };

        const Wrench = (p) => <Icon name="wrench" {...p} />;
        const Home = (p) => <Icon name="home" {...p} />;
        const FlaskConical = (p) => <Icon name="flask-conical" {...p} />;
        const Monitor = (p) => <Icon name="monitor" {...p} />;
        const Zap = (p) => <Icon name="zap" {...p} />;
        const CheckCircle2 = (p) => <Icon name="check-circle-2" {...p} />;
        const Search = (p) => <Icon name="search" {...p} />;
        const Plus = (p) => <Icon name="plus" {...p} />;
        const Phone = (p) => <Icon name="phone" {...p} />;
        const MapPin = (p) => <Icon name="map-pin" {...p} />;
        const Calendar = (p) => <Icon name="calendar" {...p} />;
        const Trash2 = (p) => <Icon name="trash-2" {...p} />;
        const Pencil = (p) => <Icon name="pencil" {...p} />;
        const AlertCircle = (p) => <Icon name="alert-circle" {...p} />;
        const SlidersHorizontal = (p) => <Icon name="sliders-horizontal" {...p} />;
        const Cpu = (p) => <Icon name="cpu" {...p} />;
        const FileText = (p) => <Icon name="file-text" {...p} />;
        const ArrowRight = (p) => <Icon name="arrow-right" {...p} />;
        const Loader2 = (p) => <Icon name="loader-2" {...p} />;
        const User = (p) => <Icon name="user" {...p} />;
        const X = (p) => <Icon name="x" {...p} />;
        const Tag = (p) => <Icon name="tag" {...p} />;
        const MessageSquare = (p) => <Icon name="message-square" {...p} />;
        const Save = (p) => <Icon name="save" {...p} />;
        const ClipboardList = (p) => <Icon name="clipboard-list" {...p} />;

        // Firebase setup (Firestore) + fallback ל-localStorage
        const firebaseConfig = {
            apiKey: "AIzaSyBVktHLR4lLddC_5GB6N0ApS0whCBMIRgw",
  authDomain: "technician-app-74278.firebaseapp.com",
  projectId: "technician-app-74278",
  storageBucket: "technician-app-74278.firebasestorage.app",
  messagingSenderId: "1006801375264",
  appId: "1:1006801375264:web:dbfb9657170f3eaef12c45"
        };

        let db = null;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        } catch (e) {
            console.warn("Firebase initialization failed, using localStorage fallback", e);
        }

        window.storage = {
            get: async (key) => {
                if (db) {
                    try {
                        const doc = await db.collection("repair-manager").doc(key).get();
                        return { value: doc.exists ? JSON.stringify(doc.data().value) : null };
                    } catch (e) {
                        console.warn("Firestore get failed, using localStorage", e);
                    }
                }
                return { value: localStorage.getItem(key) };
            },
            set: async (key, val) => {
                if (db) {
                    try {
                        await db.collection("repair-manager").doc(key).set({ value: JSON.parse(val) });
                        return;
                    } catch (e) {
                        console.warn("Firestore set failed, using localStorage", e);
                    }
                }
                localStorage.setItem(key, val);
            }
        };

        const STATUS_CONFIG = {
            waiting: { label: "ממתין", color: "#f59e0b", bg: "#fffbeb", border: "#fde68a" },
            inprogress: { label: "בטיפול", color: "#3b82f6", bg: "#eff6ff", border: "#bfdbfe" },
            done: { label: "מוכן", color: "#10b981", bg: "#f0fdf4", border: "#a7f3d0" },
            delivered: { label: "נמסר", color: "#8b5cf6", bg: "#faf5ff", border: "#ddd6fe" }
        };

        const TYPE_CONFIG = {
            home: { label: "ביקור בית", Icon: Home },
            lab: { label: "מעבדה", Icon: FlaskConical },
            remote: { label: "שלט רחוק", Icon: Monitor }
        };

        const URGENCY_CONFIG = {
            low: { label: "רגיל", color: "#6b7280", bg: "#f9fafb" },
            high: { label: "דחוף", color: "#ef4444", bg: "#fef2f2" }
        };

        const emptyForm = {
            name: "", phone: "", issue: "", type: "home",
            status: "waiting", urgency: "low", address: "",
            date: "", time: "", notes: "", device: ""
        };

        function formatDate(str) {
            if (!str) return "";
            return new Date(str + "T00:00:00").toLocaleDateString("he-IL", { day: "2-digit", month: "2-digit", year: "numeric" });
        }

        function today() {
            return new Date().toISOString().split("T")[0];
        }

        const inputStyle = {
            width: "100%", border: "2px solid #e2e8f0", borderRadius: 12, padding: "10px 13px",
            fontSize: 14, outline: "none", fontFamily: "'Heebo', sans-serif", color: "#1e293b",
            background: "#fff", boxSizing: "border-box", transition: "border-color 0.2s"
        };

        function SectionTitle({ icon: IconComponent, label }) {
            return (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
                    <div style={{ width: 28, height: 28, background: "#eff6ff", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <IconComponent size={15} color="#3b82f6" strokeWidth={2.5} />
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 800, color: "#3b82f6", textTransform: "uppercase" }}>{label}</span>
                </div>
            );
        }

        function FormGroup({ label, children }) {
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 14 }}>
                    <label style={{ fontSize: 13, fontWeight: 700, color: "#374151" }}>{label}</label>
                    {children}
                </div>
            );
        }

        function RepairManager() {
            const [tickets, setTickets] = useState([]);
            const [view, setView] = useState("queue");
            const [editing, setEditing] = useState(null);
            const [form, setForm] = useState(emptyForm);
            const [selected, setSelected] = useState(null);
            const [filter, setFilter] = useState("all");
            const [search, setSearch] = useState("");
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [confirmDelete, setConfirmDelete] = useState(null);
            const [toast, setToast] = useState(null);

            const showToast = (msg, type = "success") => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 2800);
            };

            useEffect(() => {
                (async () => {
                    try {
                        const result = await window.storage.get("tickets_v2");
                        if (result?.value) setTickets(JSON.parse(result.value));
                    } catch (e) {}
                    setLoading(false);
                })();
            }, []);

            const saveTickets = useCallback(async (list) => {
                setSaving(true);
                try { await window.storage.set("tickets_v2", JSON.stringify(list)); } catch (e) {}
                setSaving(false);
            }, []);

            const submitForm = async () => {
                if (!form.name.trim() || !form.phone.trim()) {
                    showToast("שם וטלפון הם שדות חובה", "error");
                    return;
                }
                let updated;
                if (editing !== null) {
                    updated = tickets.map((t) => t.id === editing ? { ...form, id: editing } : t);
                    showToast("הפניה עודכנה בהצלחה");
                } else {
                    updated = [{ ...form, id: Date.now(), createdAt: today() }, ...tickets];
                    showToast("פניה חדשה נוספה");
                }
                setTickets(updated);
                await saveTickets(updated);
                setView("queue"); setEditing(null); setForm(emptyForm);
            };

            const deleteTicket = async (id) => {
                const updated = tickets.filter((t) => t.id !== id);
                setTickets(updated);
                await saveTickets(updated);
                setConfirmDelete(null); setView("queue");
                showToast("הפניה נמחקה");
            };

            const updateStatus = async (id, status) => {
                const updated = tickets.map((t) => t.id === id ? { ...t, status } : t);
                setTickets(updated);
                await saveTickets(updated);
                if (selected?.id === id) setSelected((s) => ({ ...s, status }));
                showToast("סטטוס עודכן: " + STATUS_CONFIG[status].label);
            };

            const openEdit = (t) => { setForm({ ...emptyForm, ...t }); setEditing(t.id); setView("form"); };
            const openDetail = (t) => { setSelected(t); setView("detail"); };
            const goBack = () => { setView("queue"); setEditing(null); setForm(emptyForm); };

            const filtered = tickets
                .filter((t) => filter === "all" || t.status === filter)
                .filter((t) => !search.trim() || t.name.includes(search) || t.phone.includes(search))
                .sort((a, b) => {
                    if (a.urgency === "high" && b.urgency !== "high") return -1;
                    if (b.urgency === "high" && a.urgency !== "high") return 1;
                    if (a.date && b.date) return a.date.localeCompare(b.date);
                    return b.id - a.id;
                });

            const counts = Object.keys(STATUS_CONFIG).reduce((acc, k) => {
                acc[k] = tickets.filter((t) => t.status === k).length;
                return acc;
            }, {});

            if (loading) return (
                <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                    <Loader2 size={36} color="#3b82f6" style={{ animation: "spin 1s linear infinite" }} />
                    <p style={{ marginTop: 14, color: "#94a3b8", fontFamily: "'Heebo', sans-serif" }}>טוען נתונים...</p>
                </div>
            );

            return (
                <div dir="rtl" style={{ minHeight: "100vh", background: "#f1f5f9", fontFamily: "'Heebo', sans-serif" }}>
                    <style>{`
                        @keyframes spin { to { transform: rotate(360deg); } }
                        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
                        .ticket-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.06) !important; }
                        .stat-btn:hover { transform: translateY(-1px); }
                        input:focus, textarea:focus, select:focus { border-color: #3b82f6 !important; }
                    `}</style>

                    {/* Toast */}
                    {toast && (
                        <div style={{
                            position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)",
                            background: toast.type === "error" ? "#ef4444" : "#1e293b",
                            color: "#fff", padding: "11px 20px", borderRadius: 14, fontWeight: 600,
                            fontSize: 14, zIndex: 9999, boxShadow: "0 8px 30px rgba(0,0,0,0.18)",
                            animation: "slideDown 0.22s ease", whiteSpace: "nowrap",
                            display: "flex", alignItems: "center", gap: 8,
                        }}>
                            {toast.type === "error" ? <AlertCircle size={15} /> : <CheckCircle2 size={15} />}
                            {toast.msg}
                        </div>
                    )}

                    {/* Confirm Delete */}
                    {confirmDelete && (
                        <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.4)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <div style={{ background: "#fff", borderRadius: 24, padding: 32, maxWidth: 320, width: "90%", textAlign: "center" }}>
                                <div style={{ width: 58, height: 58, background: "#fef2f2", borderRadius: "50%", margin: "0 auto 16px", display: "flex", alignItems: "center", justifyContent: "center" }}>
                                    <Trash2 size={26} color="#ef4444" strokeWidth={2} />
                                </div>
                                <h3 style={{ fontSize: 20, fontWeight: 800, marginBottom: 8, color: "#0f172a" }}>מחיקת פניה</h3>
                                <p style={{ color: "#64748b", lineHeight: 1.7, marginBottom: 24, fontSize: 14 }}>
                                    האם אתה בטוח שברצונך למחוק את הפניה של <strong style={{ color: "#1e293b" }}>{confirmDelete.name}</strong>? פעולה זו אינה הפיכה.
                                </p>
                                <div style={{ display: "flex", gap: 10 }}>
                                    <button onClick={() => setConfirmDelete(null)} style={{ flex: 1, padding: "12px", borderRadius: 12, border: "2px solid #e2e8f0", background: "#fff", fontWeight: 600, cursor: "pointer" }}>ביטול</button>
                                    <button onClick={() => deleteTicket(confirmDelete.id)} style={{ flex: 1, padding: "12px", borderRadius: 12, border: "none", background: "#ef4444", color: "#fff", fontWeight: 600, cursor: "pointer" }}>מחק</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header style={{ background: "#fff", borderBottom: "1px solid #e2e8f0", position: "sticky", top: 0, zIndex: 10 }}>
                        <div style={{ maxWidth: 820, margin: "0 auto", padding: "0 16px", height: 70, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
                                <div style={{ width: 40, height: 40, background: "linear-gradient(135deg, #3b82f6, #2563eb)", borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>
                                    <Wrench size={20} color="#fff" strokeWidth={2.3} />
                                </div>
                                <div>
                                    <div style={{ fontSize: 17, fontWeight: 900, color: "#0f172a", lineHeight: 1.2 }}>ניהול תיקונים</div>
                                    <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 500 }}>{tickets.length} פניות פעילות</div>
                                </div>
                            </div>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                {saving && (
                                    <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12, color: "#94a3b8" }}>
                                        <Loader2 size={13} style={{ animation: "spin 1s linear infinite" }} /> שומר...
                                    </div>
                                )}
                                {view !== "queue" && (
                                    <button onClick={goBack} style={{ display: "flex", alignItems: "center", gap: 6, background: "#f1f5f9", border: "none", padding: "8px 14px", borderRadius: 10, cursor: "pointer", fontWeight: 600, color: "#475569" }}>
                                        <ArrowRight size={14} /> חזרה
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main style={{ maxWidth: 820, margin: "0 auto", padding: "20px 14px 50px" }}>
                        {/* QUEUE VIEW */}
                        {view === "queue" && (
                            <div style={{ animation: "fadeIn 0.2s ease" }}>
                                {/* Stats */}
                                <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 24 }}>
                                    {Object.entries(STATUS_CONFIG).map(([key, cfg]) => {
                                        const active = filter === key;
                                        return (
                                            <button key={key} className="stat-btn" onClick={() => setFilter(active ? "all" : key)} style={{
                                                background: active ? cfg.bg : "#fff",
                                                border: "2px solid " + (active ? cfg.color : "#e2e8f0"),
                                                borderRadius: 16, padding: "13px 8px", display: "flex", flexDirection: "column",
                                                alignItems: "center", gap: 5, cursor: "pointer", transition: "all 0.2s",
                                                fontFamily: "'Heebo', sans-serif", boxShadow: active ? "0 4px 12px rgba(0,0,0,0.05)" : "none"
                                            }}>
                                                <cfg.Icon size={19} color={active ? cfg.color : "#94a3b8"} strokeWidth={2.5} />
                                                <span style={{ fontSize: 23, fontWeight: 900, color: active ? cfg.color : "#1e293b", lineHeight: 1 }}>{counts[key] || 0}</span>
                                                <span style={{ fontSize: 11, color: active ? cfg.color : "#94a3b8", fontWeight: 600 }}>{cfg.label}</span>
                                            </button>
                                        );
                                    })}
                                </div>

                                {/* Toolbar */}
                                <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
                                    <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 8, background: "#fff", border: "2px solid #e2e8f0", borderRadius: 14, padding: "0 14px" }}>
                                        <Search size={15} color="#94a3b8" strokeWidth={2.5} />
                                        <input
                                            placeholder="חפש לפי שם, טלפון, תקלה..."
                                            value={search} onChange={(e) => setSearch(e.target.value)}
                                            style={{ flex: 1, border: "none", outline: "none", background: "transparent", padding: "12px 0", fontSize: 14, fontFamily: "'Heebo', sans-serif" }}
                                        />
                                    </div>
                                    <button onClick={() => { setForm({ ...emptyForm, date: today() }); setView("form"); }} style={{
                                        display: "flex", alignItems: "center", gap: 7, background: "linear-gradient(135deg, #3b82f6, #2563eb)",
                                        color: "#fff", border: "none", borderRadius: 14, padding: "0 18px",
                                        cursor: "pointer", fontSize: 14, whiteSpace: "nowrap", fontFamily: "'Heebo', sans-serif", fontWeight: 700,
                                        boxShadow: "0 4px 14px rgba(59,130,246,0.32)",
                                    }}>
                                        <Plus size={17} strokeWidth={2.5} /> פניה חדשה
                                    </button>
                                </div>

                                {filter !== "all" && (
                                    <div style={{ display: "inline-flex", alignItems: "center", gap: 7, background: "#e2e8f0", padding: "6px 12px", borderRadius: 20, fontSize: 12, fontWeight: 600, marginBottom: 14, color: "#475569" }}>
                                        <SlidersHorizontal size={12} />
                                        מסנן: {STATUS_CONFIG[filter].label}
                                        <button onClick={() => setFilter("all")} style={{ background: "none", border: "none", padding: 0, cursor: "pointer", display: "flex" }}>
                                            <X size={14} />
                                        </button>
                                    </div>
                                )}

                                {/* List */}
                                {filtered.length === 0 ? (
                                    <div style={{ textAlign: "center", padding: "60px 20px", background: "#fff", borderRadius: 20, border: "2px dashed #e2e8f0" }}>
                                        <ClipboardList size={46} color="#cbd5e1" strokeWidth={1.5} style={{ marginBottom: 12 }} />
                                        <p style={{ color: "#94a3b8", fontSize: 15, fontWeight: 500, margin: 0 }}>
                                            {tickets.length === 0 ? "הוסף פניה חדשה להתחיל" : "לא נמצאו תוצאות"}
                                        </p>
                                    </div>
                                ) : (
                                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                        {filtered.map((t) => {
                                            const sc = STATUS_CONFIG[t.status];
                                            const tc = TYPE_CONFIG[t.type];
                                            return (
                                                <div key={t.id} className="ticket-card" onClick={() => openDetail(t)} style={{
                                                    background: "#fff", borderRadius: 18, padding: "16px 18px",
                                                    cursor: "pointer", transition: "all 0.18s", boxShadow: "0 2px 10px rgba(0,0,0,0.02)",
                                                    borderRight: "4px solid " + sc.color,
                                                }}>
                                                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                                                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                                            {t.urgency === "high" && (
                                                                <div style={{ display: "flex", alignItems: "center", background: "#fef2f2", padding: "4px 8px", borderRadius: 8, gap: 4 }}>
                                                                    <Zap size={11} color="#ef4444" fill="#ef4444" />
                                                                    <span style={{ fontSize: 11, color: "#ef4444", fontWeight: 800 }}>דחוף</span>
                                                                </div>
                                                            )}
                                                            <span style={{ fontSize: 16, fontWeight: 800, color: "#0f172a" }}>{t.name}</span>
                                                        </div>
                                                        <div style={{ display: "flex", alignItems: "center", gap: 6, background: sc.bg, padding: "4px 10px", borderRadius: 20, border: "1px solid " + sc.border }}>
                                                            <sc.Icon size={12} color={sc.color} strokeWidth={2.5} />
                                                            <span style={{ fontSize: 11, color: sc.color, fontWeight: 800 }}>{sc.label}</span>
                                                        </div>
                                                    </div>

                                                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
                                                        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                                            <Phone size={12} color="#3b82f6" strokeWidth={2.5} />
                                                            <span style={{ fontSize: 13, color: "#3b82f6", fontWeight: 600 }}>{t.phone}</span>
                                                        </div>
                                                        {t.device && (
                                                            <>
                                                                <span style={{ color: "#cbd5e1" }}>|</span>
                                                                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                                                    <Cpu size={12} color="#64748b" strokeWidth={2} />
                                                                    <span style={{ fontSize: 13, color: "#64748b" }}>{t.device}</span>
                                                                </div>
                                                            </>
                                                        )}
                                                    </div>

                                                    {t.issue && (
                                                        <div style={{ fontSize: 13, color: "#475569", lineHeight: 1.5, marginBottom: 14, background: "#f8fafc", padding: "10px", borderRadius: 10 }}>
                                                            {t.issue}
                                                        </div>
                                                    )}

                                                    <div style={{ display: "flex", gap: 14, flexWrap: "wrap", borderTop: "1px solid #f1f5f9", paddingTop: 12 }}>
                                                        {tc && (
                                                            <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                                                                <tc.Icon size={11} color="#64748b" strokeWidth={2} />
                                                                <span style={{ fontSize: 11, color: "#64748b", fontWeight: 500 }}>{tc.label}</span>
                                                            </div>
                                                        )}
                                                        {t.date && (
                                                            <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                                                                <Calendar size={11} color="#64748b" strokeWidth={2} />
                                                                <span style={{ fontSize: 11, color: "#64748b", fontWeight: 500 }}>{formatDate(t.date)} {t.time}</span>
                                                            </div>
                                                        )}
                                                        {t.createdAt && (
                                                            <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                                                                <FileText size={11} color="#94a3b8" strokeWidth={2} />
                                                                <span style={{ fontSize: 11, color: "#94a3b8" }}>נוצר: {formatDate(t.createdAt)}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* DETAIL VIEW */}
                        {view === "detail" && selected && (() => {
                            const t = tickets.find((x) => x.id === selected.id) || selected;
                            const sc = STATUS_CONFIG[t.status];
                            const tc = TYPE_CONFIG[t.type];
                            return (
                                <div style={{ animation: "fadeIn 0.2s ease" }}>
                                    <div style={{ background: "#fff", borderRadius: 22, padding: 24, boxShadow: "0 4px 20px rgba(0,0,0,0.03)", marginBottom: 16 }}>
                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
                                            <div>
                                                {t.urgency === "high" && (
                                                    <div style={{ display: "inline-flex", alignItems: "center", gap: 4, background: "#fef2f2", padding: "4px 10px", borderRadius: 8, marginBottom: 10 }}>
                                                        <Zap size={12} color="#ef4444" fill="#ef4444" />
                                                        <span style={{ fontSize: 12, color: "#ef4444", fontWeight: 800 }}>טיפול דחוף</span>
                                                    </div>
                                                )}
                                                <h2 style={{ fontSize: 24, fontWeight: 900, color: "#0f172a", margin: "0 0 6px" }}>{t.name}</h2>
                                                <a href={"tel:" + t.phone} style={{ display: "flex", alignItems: "center", gap: 6, color: "#3b82f6", textDecoration: "none", fontWeight: 700, fontSize: 15 }}>
                                                    <Phone size={14} strokeWidth={2.5} /> {t.phone}
                                                </a>
                                            </div>
                                            <div style={{ display: "flex", alignItems: "center", gap: 6, background: sc.bg, padding: "8px 14px", borderRadius: 20, border: "2px solid " + sc.border }}>
                                                <sc.Icon size={15} color={sc.color} strokeWidth={2.3} />
                                                <span style={{ fontSize: 14, color: sc.color, fontWeight: 800 }}>{sc.label}</span>
                                            </div>
                                        </div>

                                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 }}>
                                            {[
                                                t.device && { icon: Cpu, label: "מכשיר", value: t.device },
                                                tc && { icon: tc.Icon, label: "סוג שירות", value: tc.label },
                                                t.date && { icon: Calendar, label: "תאריך ושעה", value: `${formatDate(t.date)} ${t.time || ""}` },
                                                t.address && { icon: MapPin, label: "כתובת", value: t.address }
                                            ].filter(Boolean).map((item, i) => (
                                                <div key={i} style={{ background: "#f8fafc", borderRadius: 14, padding: "12px 14px" }}>
                                                    <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 4 }}>
                                                        <item.icon size={12} color="#64748b" strokeWidth={2} />
                                                        <span style={{ fontSize: 10, color: "#94a3b8", fontWeight: 700, textTransform: "uppercase" }}>{item.label}</span>
                                                    </div>
                                                    <div style={{ fontSize: 14, fontWeight: 600, color: "#1e293b", lineHeight: 1.3 }}>{item.value}</div>
                                                </div>
                                            ))}
                                        </div>

                                        {t.issue && (
                                            <div style={{ marginBottom: 14 }}>
                                                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                                                    <MessageSquare size={13} color="#64748b" strokeWidth={2} />
                                                    <span style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700 }}>תיאור התקלה</span>
                                                </div>
                                                <div style={{ background: "#f8fafc", borderRadius: 12, padding: 16, fontSize: 14, color: "#334155", lineHeight: 1.6 }}>
                                                    {t.issue}
                                                </div>
                                            </div>
                                        )}

                                        {t.notes && (
                                            <div>
                                                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
                                                    <Tag size={13} color="#64748b" strokeWidth={2} />
                                                    <span style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700 }}>הערות פנימיות</span>
                                                </div>
                                                <div style={{ background: "#fffbeb", borderRadius: 12, padding: 16, fontSize: 14, color: "#92400e", lineHeight: 1.6, border: "1px dashed #fcd34d" }}>
                                                    {t.notes}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Status updater */}
                                    <div style={{ background: "#fff", borderRadius: 22, padding: 20, boxShadow: "0 4px 20px rgba(0,0,0,0.03)", marginBottom: 16 }}>
                                        <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700, textTransform: "uppercase", marginBottom: 12 }}>עדכון סטטוס</div>
                                        <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10 }}>
                                            {Object.entries(STATUS_CONFIG).map(([key, cfg]) => (
                                                <button key={key} onClick={() => updateStatus(t.id, key)} style={{
                                                    display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                                                    padding: "11px", borderRadius: 12, border: "2px solid " + (t.status === key ? cfg.color : "#e2e8f0"),
                                                    background: t.status === key ? cfg.bg : "#fff", color: t.status === key ? cfg.color : "#64748b",
                                                    fontWeight: t.status === key ? 800 : 500, cursor: "pointer",
                                                    fontSize: 13, transition: "all 0.15s", fontFamily: "'Heebo', sans-serif"
                                                }}>
                                                    <cfg.Icon size={14} strokeWidth={t.status === key ? 2.5 : 2} />
                                                    {cfg.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div style={{ display: "flex", gap: 10 }}>
                                        <button onClick={() => openEdit(t)} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "13px", borderRadius: 14, border: "2px solid #3b82f6", background: "#eff6ff", color: "#3b82f6", fontWeight: 700, cursor: "pointer", fontSize: 14, fontFamily: "'Heebo', sans-serif" }}>
                                            <Pencil size={15} strokeWidth={2.5} /> ערוך פניה
                                        </button>
                                        <button onClick={() => setConfirmDelete(t)} style={{ padding: "13px", borderRadius: 14, border: "2px solid #e2e8f0", background: "#fff", color: "#ef4444", cursor: "pointer" }}>
                                            <Trash2 size={15} strokeWidth={2.5} />
                                        </button>
                                    </div>
                                </div>
                            );
                        })()}

                        {/* FORM VIEW */}
                        {view === "form" && (
                            <div style={{ animation: "fadeIn 0.2s ease" }}>
                                <h2 style={{ fontSize: 20, fontWeight: 900, color: "#0f172a", marginBottom: 20, display: "flex", alignItems: "center", gap: 8 }}>
                                    {editing ? <><Pencil size={19} color="#3b82f6" /> עריכת פניה</> : <><Plus size={19} color="#3b82f6" /> פניה חדשה</>}
                                </h2>

                                <div style={{ background: "#fff", borderRadius: 22, padding: 22, boxShadow: "0 4px 20px rgba(0,0,0,0.03)", marginBottom: 16 }}>
                                    <SectionTitle icon={User} label="פרטי לקוח" />
                                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                                        <FormGroup label="שם לקוח *">
                                            <input style={inputStyle} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} />
                                        </FormGroup>
                                        <FormGroup label="טלפון *">
                                            <input style={inputStyle} type="tel" value={form.phone} onChange={(e) => setForm({ ...form, phone: e.target.value })} />
                                        </FormGroup>
                                    </div>
                                    <FormGroup label="כתובת (לביקורי בית)">
                                        <input style={inputStyle} value={form.address} onChange={(e) => setForm({ ...form, address: e.target.value })} />
                                    </FormGroup>
                                </div>

                                <div style={{ background: "#fff", borderRadius: 22, padding: 22, boxShadow: "0 4px 20px rgba(0,0,0,0.03)", marginBottom: 16 }}>
                                    <SectionTitle icon={Wrench} label="פרטי תקלה" />
                                    <FormGroup label="מכשיר / ציוד">
                                        <input style={inputStyle} value={form.device} onChange={(e) => setForm({ ...form, device: e.target.value })} />
                                    </FormGroup>
                                    <FormGroup label="תיאור התקלה">
                                        <textarea style={{ ...inputStyle, resize: "vertical", minHeight: 80 }} value={form.issue} onChange={(e) => setForm({ ...form, issue: e.target.value })} />
                                    </FormGroup>
                                    <FormGroup label="הערות פנימיות">
                                        <textarea style={{ ...inputStyle, resize: "vertical", minHeight: 60, background: "#fffbeb" }} value={form.notes} onChange={(e) => setForm({ ...form, notes: e.target.value })} />
                                    </FormGroup>
                                </div>

                                <div style={{ background: "#fff", borderRadius: 22, padding: 22, boxShadow: "0 4px 20px rgba(0,0,0,0.03)", marginBottom: 24 }}>
                                    <SectionTitle icon={Calendar} label="תזמון ולוגיסטיקה" />
                                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                                        <FormGroup label="סוג שירות">
                                            <select style={inputStyle} value={form.type} onChange={(e) => setForm({ ...form, type: e.target.value })}>
                                                {Object.entries(TYPE_CONFIG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                                            </select>
                                        </FormGroup>
                                        <FormGroup label="דחיפות">
                                            <select style={inputStyle} value={form.urgency} onChange={(e) => setForm({ ...form, urgency: e.target.value })}>
                                                {Object.entries(URGENCY_CONFIG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                                            </select>
                                        </FormGroup>
                                        <FormGroup label="תאריך">
                                            <input style={inputStyle} type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} />
                                        </FormGroup>
                                        <FormGroup label="שעה">
                                            <input style={inputStyle} type="time" value={form.time} onChange={(e) => setForm({ ...form, time: e.target.value })} />
                                        </FormGroup>
                                    </div>
                                    <FormGroup label="סטטוס">
                                        <select style={inputStyle} value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })}>
                                            {Object.entries(STATUS_CONFIG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                                        </select>
                                    </FormGroup>
                                </div>

                                <div style={{ display: "flex", gap: 10 }}>
                                    <button onClick={goBack} style={{ flex: 1, padding: "13px", borderRadius: 14, border: "2px solid #e2e8f0", background: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 15, fontFamily: "'Heebo', sans-serif" }}>
                                        ביטול
                                    </button>
                                    <button onClick={submitForm} style={{
                                        flex: 2, display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                                        padding: "13px", borderRadius: 14, border: "none",
                                        background: "linear-gradient(135deg, #3b82f6, #2563eb)", color: "#fff",
                                        fontWeight: 800, cursor: "pointer", fontSize: 15, fontFamily: "'Heebo', sans-serif",
                                        boxShadow: "0 4px 14px rgba(59,130,246,0.35)",
                                    }}>
                                        <Save size={16} strokeWidth={2.5} />
                                        {editing ? "שמור שינויים" : "הוסף פניה"}
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RepairManager />);
    </script>
</body>
</html>
