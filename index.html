<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TechQ – ניהול תורים ותקלות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.441.0/dist/umd/lucide.js"></script>

<!-- ═══════════════════════════════════════════════════════════
     🔥 FIREBASE CONFIGURATION
     1. היכנס ל: https://console.firebase.google.com
     2. צור פרויקט → הפעל Firestore Database
     3. הגדרות פרויקט → העתק את ה-firebaseConfig
     4. הדבק את הפרטים כאן למטה במקום ה-YOUR_...
     ═══════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore,
           collection, addDoc, updateDoc,
           deleteDoc, doc, query,
           orderBy, onSnapshot }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBVktHLR4lLddC_5GB6N0ApS0whCBMIRgw",
  authDomain: "technician-app-74278.firebaseapp.com",
  projectId: "technician-app-74278",
  storageBucket: "technician-app-74278.firebasestorage.app",
  messagingSenderId: "1006801375264",
  appId: "1:1006801375264:web:dbfb9657170f3eaef12c45"
  };
  /* ─────────────────────────────────────────────── */

  /* אם לא מולא config — לא מנסה להתחבר */
  if (firebaseConfig.apiKey === "YOUR_API_KEY") return;

  try {
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const col = collection(db, "customers");

    window.FB = {
      add:    (data)     => addDoc(col, { ...data, createdAt: Date.now() }),
      update: (id, data) => updateDoc(doc(db, "customers", id), data),
      delete: (id)       => deleteDoc(doc(db, "customers", id)),
      listen: (cb)       => onSnapshot(query(col, orderBy("createdAt","desc")), snap => {
        cb(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      }),
    };

    document.dispatchEvent(new Event("fb-ready"));
  } catch(e) {
    console.warn("Firebase init failed:", e.message);
  }
</script>

<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Heebo', sans-serif;
  background: #f8f9fb;
  color: #111827;
  min-height: 100vh;
  direction: rtl;
  -webkit-font-smoothing: antialiased;
}
a { text-decoration: none; color: inherit; }
button { font-family: 'Heebo', sans-serif; cursor: pointer; border: none; outline: none; }
input, textarea, select { font-family: 'Heebo', sans-serif; outline: none; }
input::placeholder, textarea::placeholder { color: #b0b7c3; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #dde1e9; border-radius: 99px; }

/* ── TOAST ── */
#toast {
  position: fixed; top: 18px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  color: #fff; padding: 10px 22px; border-radius: 50px;
  font-weight: 600; font-size: 13px; z-index: 9999;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 6px 24px rgba(0,0,0,.13); white-space: nowrap;
  display: flex; align-items: center; gap: 7px;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(17,24,39,.3); backdrop-filter: blur(5px);
  z-index: 800; display: flex;
  align-items: center; justify-content: center; padding: 16px;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: #fff; border-radius: 20px;
  padding: 30px 26px; width: 100%; max-width: 380px;
  text-align: center; box-shadow: 0 24px 64px rgba(17,24,39,.14);
  transform: translateY(16px) scale(.97);
  transition: transform .25s cubic-bezier(.34,1.4,.64,1);
}
.overlay.open .modal { transform: translateY(0) scale(1); }
.modal-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: #fef2f2; color: #dc2626;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
}
.modal-icon svg { width: 24px; height: 24px; }
.modal-title { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 8px; }
.modal-text  { color: #6b7280; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
.modal-btns  { display: flex; gap: 10px; justify-content: center; }

/* ── HEADER ── */
#header {
  background: #fff;
  border-bottom: 1px solid #f0f1f4;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 0 #f0f1f4;
}
.header-inner {
  max-width: 780px; margin: 0 auto; padding: 13px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 11px; }
.logo-icon {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(135deg, #1e40af, #3b82f6);
  display: flex; align-items: center; justify-content: center; color: #fff;
}
.logo-icon svg { width: 20px; height: 20px; }
.logo-title { font-size: 18px; font-weight: 800; color: #111827; letter-spacing: -.025em; }
.logo-sub   { font-size: 11px; color: #9ca3af; font-weight: 400; margin-top: 1px; }

/* ── FB STATUS ── */
#fb-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; color: #9ca3af;
  background: #f3f4f6; border-radius: 99px; padding: 4px 10px;
}
.fb-dot { width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; }
.fb-dot.live   { background: #10b981; }
.fb-dot.local  { background: #f59e0b; }

/* ── MAIN ── */
#main { max-width: 780px; margin: 0 auto; padding: 20px 16px 100px; }

/* ── STATS ── */
.stats-row {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 10px; margin-bottom: 20px;
}
.stat-btn {
  background: #fff; border: 1.5px solid #f0f1f4; border-radius: 14px;
  padding: 13px 8px; display: flex; flex-direction: column;
  align-items: center; gap: 4px; cursor: pointer; transition: all .18s;
  box-shadow: 0 1px 3px rgba(17,24,39,.04);
}
.stat-btn:hover { border-color: #dde1e9; box-shadow: 0 2px 8px rgba(17,24,39,.07); }
.stat-btn svg   { width: 18px; height: 18px; color: #9ca3af; }
.stat-btn.active { border-color: #3b82f6; background: #eff6ff; box-shadow: 0 0 0 3px rgba(59,130,246,.08); }
.stat-btn.active svg { color: #2563eb; }
.stat-count { font-size: 24px; font-weight: 800; line-height: 1; color: #111827; }
.stat-btn.active .stat-count { color: #2563eb; }
.stat-label { font-size: 11px; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

/* ── FORM CARD ── */
#form-card {
  background: #fff; border-radius: 18px;
  padding: 22px 20px; border: 1.5px solid #f0f1f4;
  margin-bottom: 18px; box-shadow: 0 2px 12px rgba(17,24,39,.05);
}
.form-title {
  font-size: 15px; font-weight: 700; color: #111827;
  margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
}
.form-title svg { width: 16px; height: 16px; color: #3b82f6; }
.form-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px;
}
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg.full { grid-column: 1 / -1; }
label { font-size: 11px; color: #6b7280; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
.inp {
  background: #f9fafb; border: 1.5px solid #e5e7eb;
  border-radius: 9px; padding: 9px 12px;
  color: #111827; font-size: 14px; font-family: 'Heebo', sans-serif;
  width: 100%; transition: border-color .18s, box-shadow .18s;
}
.inp:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
textarea.inp { resize: vertical; min-height: 72px; }
select.inp   { cursor: pointer; }
.toggle-group { display: flex; gap: 7px; }
.toggle-btn {
  flex: 1; padding: 8px 4px; border-radius: 9px; border: 1.5px solid #e5e7eb;
  background: #f9fafb; color: #6b7280; cursor: pointer;
  font-size: 12px; font-family: 'Heebo', sans-serif; font-weight: 600;
  transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 5px;
}
.toggle-btn svg { width: 13px; height: 13px; }
.form-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }

/* ── BUTTONS ── */
.btn-primary {
  background: linear-gradient(135deg, #1e40af, #3b82f6);
  color: #fff; border: none; border-radius: 10px; padding: 10px 20px;
  font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  box-shadow: 0 2px 8px rgba(59,130,246,.3); transition: opacity .15s;
}
.btn-primary svg { width: 15px; height: 15px; }
.btn-primary:hover { opacity: .9; }
.btn-secondary {
  background: transparent; color: #6b7280;
  border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 10px 18px;
  font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.btn-secondary:hover { border-color: #d1d5db; color: #374151; }
.btn-cancel {
  padding: 10px 22px; border-radius: 9px; border: 1.5px solid #e5e7eb;
  background: transparent; color: #6b7280; cursor: pointer;
  font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 600;
}
.btn-delete {
  padding: 10px 22px; border-radius: 9px; border: none;
  background: #dc2626; color: #fff; cursor: pointer;
  font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 700;
}

/* ── SEARCH ── */
.search-wrap {
  display: flex; align-items: center; gap: 10px;
  background: #fff; border: 1.5px solid #e5e7eb;
  border-radius: 13px; padding: 0 14px; margin-bottom: 16px;
  box-shadow: 0 1px 3px rgba(17,24,39,.04);
  transition: border-color .18s;
}
.search-wrap:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.08); }
.search-wrap svg { width: 16px; height: 16px; color: #9ca3af; flex-shrink: 0; }
.search-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: #111827; font-size: 14px; padding: 13px 0;
  font-family: 'Heebo', sans-serif;
}
.clear-btn {
  background: none; border: none; color: #9ca3af; cursor: pointer;
  padding: 2px; display: flex; align-items: center;
}
.clear-btn svg { width: 14px; height: 14px; }

/* ── EMPTY ── */
.empty-state { text-align: center; padding: 64px 20px; }
.empty-icon  { margin-bottom: 14px; display: flex; justify-content: center; color: #e5e7eb; }
.empty-icon svg { width: 52px; height: 52px; }
.empty-text  { margin: 0 0 20px; font-size: 15px; color: #6b7280; }

/* ── LIST ── */
#list { display: flex; flex-direction: column; gap: 10px; }
.card {
  background: #fff; border: 1.5px solid #f0f1f4; border-radius: 16px;
  padding: 15px 18px; transition: box-shadow .18s, border-color .18s;
  box-shadow: 0 1px 3px rgba(17,24,39,.04);
  animation: fadeUp .25s ease both;
}
.card:hover { box-shadow: 0 4px 16px rgba(17,24,39,.08); border-color: #e5e7eb; }
.card.urgent { border-color: rgba(220,38,38,.2); background: #fffafa; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
.card-left { display: flex; flex-direction: column; gap: 3px; }
.card-name { font-size: 15px; font-weight: 700; color: #111827; display: flex; align-items: center; gap: 6px; }
.urgent-dot { width: 7px; height: 7px; background: #dc2626; border-radius: 50%; flex-shrink: 0; }
.card-phone {
  font-size: 13px; color: #2563eb; font-weight: 500;
  display: flex; align-items: center; gap: 4px; transition: opacity .15s;
}
.card-phone:hover { opacity: .75; }
.card-phone svg { width: 12px; height: 12px; }
.card-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-start; }
.badge {
  font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 99px; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.badge svg { width: 10px; height: 10px; }
.card-device {
  font-size: 12px; color: #374151; font-weight: 600; margin-top: 7px;
  display: flex; align-items: center; gap: 6px;
  background: #f3f4f6; border-radius: 8px; padding: 4px 9px;
  width: fit-content;
}
.card-device svg { width: 12px; height: 12px; color: #6b7280; }
.card-issue {
  font-size: 13px; color: #4b5563; margin-top: 8px; line-height: 1.5;
  display: flex; align-items: flex-start; gap: 6px;
}
.card-issue svg { width: 12px; height: 12px; color: #9ca3af; flex-shrink: 0; margin-top: 2px; }
.card-notes {
  font-size: 12px; color: #9ca3af; margin-top: 4px;
  line-height: 1.5; font-style: italic; display: flex; align-items: flex-start; gap: 6px;
}
.card-notes svg { width: 11px; height: 11px; color: #c4c9d4; flex-shrink: 0; margin-top: 2px; }
.card-bottom {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 12px; padding-top: 11px; border-top: 1px solid #f3f4f6;
}
.card-date { font-size: 11px; color: #9ca3af; display: flex; align-items: center; gap: 4px; }
.card-date svg { width: 11px; height: 11px; }
.card-actions { display: flex; gap: 3px; }
.act-btn {
  background: none; border: none; cursor: pointer; padding: 5px 7px;
  border-radius: 7px; transition: background .15s; color: #9ca3af;
  display: flex; align-items: center;
}
.act-btn svg { width: 15px; height: 15px; }
.act-btn:hover          { background: #f3f4f6; color: #374151; }
.act-btn.green          { color: #059669; }
.act-btn.green:hover    { background: #ecfdf5; }
.act-btn.red            { color: #dc2626; }
.act-btn.red:hover      { background: #fef2f2; }

/* ── LOADING ── */
#loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh; background: #f8f9fb;
}
.spinner {
  width: 40px; height: 40px; border-radius: 50%;
  border: 3px solid #e5e7eb; border-top-color: #3b82f6;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .stats-row      { gap: 6px; }
  .stat-btn       { padding: 10px 4px; }
  .stat-count     { font-size: 19px; }
  .stat-label     { font-size: 10px; }
  .form-grid      { grid-template-columns: 1fr; }
  .hide-mobile    { display: none; }
  .header-inner   { padding: 11px 14px; }
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- HEADER -->
<header id="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon"><i data-lucide="monitor-cog"></i></div>
      <div>
        <div class="logo-title">TechQ</div>
        <div class="logo-sub">ניהול תורים ותקלות</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div id="fb-badge">
        <div class="fb-dot local" id="fb-dot"></div>
        <span id="fb-label">מקומי</span>
      </div>
      <button class="btn-primary" id="toggle-form-btn" onclick="toggleForm()">
        <i data-lucide="plus"></i><span class="hide-mobile">לקוח חדש</span>
      </button>
    </div>
  </div>
</header>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <p style="color:#9ca3af;margin-top:16px;font-size:14px;">טוען נתונים...</p>
</div>

<main id="main" style="display:none;">

  <!-- STATS -->
  <div class="stats-row">
    <button class="stat-btn active" onclick="setFilter('all',this)">
      <i data-lucide="layout-list"></i>
      <span class="stat-count" id="cnt-all">0</span>
      <span class="stat-label">הכל</span>
    </button>
    <button class="stat-btn" onclick="setFilter('waiting',this)">
      <i data-lucide="clock"></i>
      <span class="stat-count" id="cnt-waiting">0</span>
      <span class="stat-label">ממתין</span>
    </button>
    <button class="stat-btn" onclick="setFilter('active',this)">
      <i data-lucide="wrench"></i>
      <span class="stat-count" id="cnt-active">0</span>
      <span class="stat-label">בטיפול</span>
    </button>
    <button class="stat-btn" onclick="setFilter('done',this)">
      <i data-lucide="check-circle-2"></i>
      <span class="stat-count" id="cnt-done">0</span>
      <span class="stat-label">הושלם</span>
    </button>
  </div>

  <!-- FORM CARD -->
  <div id="form-card" style="display:none;">
    <div class="form-title" id="form-title-el">
      <i data-lucide="user-plus"></i> הוספת לקוח חדש
    </div>
    <div class="form-grid">

      <div class="fg">
        <label>שם הלקוח *</label>
        <input class="inp" id="f-name" placeholder="ישראל ישראלי" />
      </div>
      <div class="fg">
        <label>טלפון *</label>
        <input class="inp" id="f-phone" placeholder="050-1234567" type="tel" />
      </div>
      <div class="fg">
        <label>תאריך ושעה</label>
        <input class="inp" id="f-date" type="datetime-local" />
      </div>
      <div class="fg">
        <label>סטטוס</label>
        <select class="inp" id="f-status">
          <option value="waiting">ממתין</option>
          <option value="active">בטיפול</option>
          <option value="done">הושלם</option>
          <option value="cancelled">בוטל</option>
        </select>
      </div>

      <!-- סוג שירות -->
      <div class="fg">
        <label>סוג שירות</label>
        <div class="toggle-group">
          <button class="toggle-btn" id="seg-home" onclick="setSeg('service','home')">
            <i data-lucide="home"></i> ביקור בית
          </button>
          <button class="toggle-btn" id="seg-lab" onclick="setSeg('service','lab')">
            <i data-lucide="flask-conical"></i> מעבדה
          </button>
        </div>
      </div>

      <!-- עדיפות -->
      <div class="fg">
        <label>עדיפות</label>
        <div class="toggle-group">
          <button class="toggle-btn" id="seg-normal" onclick="setSeg('priority','normal')">
            <i data-lucide="minus-circle"></i> רגיל
          </button>
          <button class="toggle-btn" id="seg-urgent" onclick="setSeg('priority','urgent')">
            <i data-lucide="alert-circle"></i> דחוף
          </button>
        </div>
      </div>

      <!-- סוג מכשיר -->
      <div class="fg">
        <label>סוג מכשיר</label>
        <select class="inp" id="f-device">
          <option value="">— בחר מכשיר —</option>
          <option value="מחשב נייד">💻 מחשב נייד</option>
          <option value="מחשב שולחני">🖥️ מחשב שולחני</option>
          <option value="מסך">🖵 מסך</option>
          <option value="מדפסת">🖨️ מדפסת</option>
          <option value="טאבלט">📱 טאבלט</option>
          <option value="שרת">🗄️ שרת</option>
          <option value="רשת / ראוטר">📡 רשת / ראוטר</option>
          <option value="אחר">🔧 אחר</option>
        </select>
      </div>

      <div class="fg full">
        <label>תיאור התקלה</label>
        <input class="inp" id="f-issue" placeholder="המחשב לא נדלק, וירוס, מסך שבור..." />
      </div>
      <div class="fg full">
        <label>הערות נוספות</label>
        <textarea class="inp" id="f-notes" placeholder="סיסמת מחשב, מה ניסו כבר, חומרה שנשלחה..."></textarea>
      </div>

    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeForm()">ביטול</button>
      <button class="btn-primary" id="submit-btn" onclick="submitForm()">
        <i data-lucide="plus"></i> <span id="submit-label">הוסף לתור</span>
      </button>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <i data-lucide="search"></i>
    <input class="search-input" id="search" placeholder="חיפוש לפי שם, טלפון, מכשיר או תקלה..." oninput="renderList()" />
    <button class="clear-btn" id="clear-btn" onclick="clearSearch()" style="display:none;">
      <i data-lucide="x"></i>
    </button>
  </div>

  <!-- LIST -->
  <div id="list"></div>
</main>

<!-- DELETE MODAL -->
<div class="overlay" id="del-overlay" onclick="closeDelModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-icon"><i data-lucide="trash-2"></i></div>
    <div class="modal-title">מחיקת לקוח</div>
    <div class="modal-text" id="del-text">האם למחוק לקוח זה?</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDelModal()">ביטול</button>
      <button class="btn-delete" onclick="confirmDelete()">מחק</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════
   STATE
════════════════════════════════ */
const LS      = 'techq-v2';
let customers = [];
let filter    = 'all';
let editId    = null;
let delId     = null;
let fService  = 'home';
let fPriority = 'normal';
let showForm  = false;
let useFirebase = false;

const STATUS = {
  waiting:   { label:'ממתין',  color:'#d97706', bg:'rgba(217,119,6,.10)',   icon:'clock'          },
  active:    { label:'בטיפול', color:'#2563eb', bg:'rgba(37,99,235,.10)',   icon:'wrench'         },
  done:      { label:'הושלם', color:'#059669', bg:'rgba(5,150,105,.10)',    icon:'check-circle-2' },
  cancelled: { label:'בוטל',  color:'#6b7280', bg:'rgba(107,114,128,.10)', icon:'x-circle'       },
};
const SERVICE = {
  home: { label:'ביקור בית', color:'#7c3aed', bg:'rgba(124,58,237,.10)', icon:'home'          },
  lab:  { label:'מעבדה',    color:'#059669', bg:'rgba(5,150,105,.10)',   icon:'flask-conical' },
};
const DEVICE_ICON = {
  'מחשב נייד':    'laptop',
  'מחשב שולחני':  'monitor',
  'מסך':          'monitor',
  'מדפסת':        'printer',
  'טאבלט':        'tablet-smartphone',
  'שרת':          'server',
  'רשת / ראוטר':  'wifi',
  'אחר':          'wrench',
};

/* ════════════════════════════════
   FIREBASE LISTENER
════════════════════════════════ */
document.addEventListener('fb-ready', () => {
  useFirebase = true;
  document.getElementById('fb-dot').className   = 'fb-dot live';
  document.getElementById('fb-label').textContent = 'Firebase';
  window.FB.listen(list => {
    customers = list;
    renderList();
    updateCounts();
  });
});

/* ════════════════════════════════
   INIT
════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  try { customers = JSON.parse(localStorage.getItem(LS) || '[]'); } catch { customers = []; }
  document.getElementById('f-date').value = nowStr();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display    = 'block';
  setSeg('service', 'home');
  setSeg('priority', 'normal');
  renderList();
  updateCounts();
});

function lsSave() {
  try { localStorage.setItem(LS, JSON.stringify(customers)); } catch {}
}
function nowStr() { return new Date().toISOString().slice(0,16); }
function genId()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
let toastT;
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'error' ? '#dc2626' : '#059669';
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2500);
}

/* ════════════════════════════════
   FILTER
════════════════════════════════ */
function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

/* ════════════════════════════════
   FORM
════════════════════════════════ */
function toggleForm() {
  if (showForm && !editId) { closeForm(); return; }
  editId   = null;
  showForm = true;
  document.getElementById('f-name').value   = '';
  document.getElementById('f-phone').value  = '';
  document.getElementById('f-issue').value  = '';
  document.getElementById('f-notes').value  = '';
  document.getElementById('f-device').value = '';
  document.getElementById('f-status').value = 'waiting';
  document.getElementById('f-date').value   = nowStr();
  setSeg('service','home');
  setSeg('priority','normal');
  setFormUI(false);
  document.getElementById('form-card').style.display = 'block';
  setToggleBtn(true);
  document.getElementById('form-card').scrollIntoView({ behavior:'smooth' });
}

function closeForm() {
  showForm = false; editId = null;
  document.getElementById('form-card').style.display = 'none';
  setToggleBtn(false);
}

function setToggleBtn(open) {
  const btn = document.getElementById('toggle-form-btn');
  btn.innerHTML = open
    ? '<i data-lucide="x"></i><span class="hide-mobile">סגור</span>'
    : '<i data-lucide="plus"></i><span class="hide-mobile">לקוח חדש</span>';
  lucide.createIcons();
}

function setFormUI(isEdit) {
  document.getElementById('form-title-el').innerHTML = isEdit
    ? '<i data-lucide="pencil"></i> עריכת לקוח'
    : '<i data-lucide="user-plus"></i> הוספת לקוח חדש';
  document.getElementById('submit-btn').innerHTML = isEdit
    ? '<i data-lucide="save"></i> <span>שמור שינויים</span>'
    : '<i data-lucide="plus"></i> <span>הוסף לתור</span>';
  lucide.createIcons();
}

function setSeg(type, val) {
  if (type === 'service') {
    fService = val;
    document.getElementById('seg-home').style.cssText =
      val==='home' ? 'background:rgba(124,58,237,.10);color:#7c3aed;border-color:#7c3aed;' : '';
    document.getElementById('seg-lab').style.cssText  =
      val==='lab'  ? 'background:rgba(5,150,105,.10);color:#059669;border-color:#059669;'  : '';
  } else {
    fPriority = val;
    document.getElementById('seg-normal').style.cssText =
      val==='normal' ? 'background:rgba(37,99,235,.08);color:#2563eb;border-color:#2563eb;'  : '';
    document.getElementById('seg-urgent').style.cssText =
      val==='urgent' ? 'background:rgba(220,38,38,.09);color:#dc2626;border-color:#dc2626;' : '';
  }
}

function openEdit(id) {
  const c = customers.find(x => x.id === id);
  if (!c) return;
  editId = id; showForm = true;
  document.getElementById('f-name').value   = c.name    || '';
  document.getElementById('f-phone').value  = c.phone   || '';
  document.getElementById('f-issue').value  = c.issue   || '';
  document.getElementById('f-notes').value  = c.notes   || '';
  document.getElementById('f-device').value = c.device  || '';
  document.getElementById('f-status').value = c.status  || 'waiting';
  document.getElementById('f-date').value   = (c.date || c.createdAt || '').slice(0,16);
  setSeg('service',  c.service  || 'home');
  setSeg('priority', c.priority || 'normal');
  setFormUI(true);
  document.getElementById('form-card').style.display = 'block';
  setToggleBtn(true);
  document.getElementById('form-card').scrollIntoView({ behavior:'smooth' });
}

async function submitForm() {
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!name || !phone) { toast('שם וטלפון הם שדות חובה','error'); return; }

  const data = {
    name, phone,
    issue:    document.getElementById('f-issue').value.trim(),
    notes:    document.getElementById('f-notes').value.trim(),
    device:   document.getElementById('f-device').value,
    status:   document.getElementById('f-status').value,
    date:     document.getElementById('f-date').value,
    service:  fService,
    priority: fPriority,
  };

  if (useFirebase) {
    if (editId) { await window.FB.update(editId, data); toast('הלקוח עודכן בהצלחה'); }
    else        { await window.FB.add(data);            toast('לקוח נוסף בהצלחה');   }
    // Firebase listener מעדכן את הרשימה
  } else {
    if (editId) {
      customers = customers.map(c => c.id === editId ? { ...c, ...data } : c);
      toast('הלקוח עודכן בהצלחה');
    } else {
      customers.unshift({ ...data, id: genId(), createdAt: new Date().toISOString() });
      toast('לקוח נוסף בהצלחה');
    }
    lsSave(); renderList(); updateCounts();
  }
  closeForm();
}

/* ════════════════════════════════
   STATUS
════════════════════════════════ */
async function changeStatus(id, status) {
  if (useFirebase) {
    await window.FB.update(id, { status });
  } else {
    customers = customers.map(c => c.id === id ? { ...c, status } : c);
    lsSave(); renderList(); updateCounts();
  }
}

/* ════════════════════════════════
   DELETE
════════════════════════════════ */
function askDelete(id, name) {
  delId = id;
  document.getElementById('del-text').innerHTML =
    `האם למחוק את <strong>${esc(name)}</strong>? פעולה זו לא ניתנת לביטול.`;
  document.getElementById('del-overlay').classList.add('open');
}
function closeDelModal(e) {
  if (e && e.target !== document.getElementById('del-overlay')) return;
  document.getElementById('del-overlay').classList.remove('open');
  delId = null;
}
async function confirmDelete() {
  if (!delId) return;
  if (useFirebase) {
    await window.FB.delete(delId);
  } else {
    customers = customers.filter(c => c.id !== delId);
    lsSave(); renderList(); updateCounts();
  }
  document.getElementById('del-overlay').classList.remove('open');
  toast('הלקוח נמחק');
  delId = null;
}

/* ════════════════════════════════
   SEARCH
════════════════════════════════ */
function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  renderList();
}

/* ════════════════════════════════
   COUNTS
════════════════════════════════ */
function updateCounts() {
  document.getElementById('cnt-all').textContent     = customers.length;
  document.getElementById('cnt-waiting').textContent = customers.filter(c=>c.status==='waiting').length;
  document.getElementById('cnt-active').textContent  = customers.filter(c=>c.status==='active').length;
  document.getElementById('cnt-done').textContent    = customers.filter(c=>c.status==='done').length;
}

/* ════════════════════════════════
   RENDER
════════════════════════════════ */
function renderList() {
  const q  = (document.getElementById('search').value || '').trim().toLowerCase();
  const cb = document.getElementById('clear-btn');
  cb.style.display = q ? 'flex' : 'none';

  const list = customers.filter(c => {
    const mf = filter === 'all' || c.status === filter;
    const mq = !q || [c.name,c.phone,c.issue,c.notes,c.device].join(' ').toLowerCase().includes(q);
    return mf && mq;
  });

  const el = document.getElementById('list');

  if (list.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i data-lucide="${q?'search-x':'inbox'}"></i></div>
        <p class="empty-text">${q ? 'לא נמצאו תוצאות לחיפוש' : 'אין לקוחות עדיין'}</p>
        ${!q ? `<button class="btn-primary" onclick="toggleForm()" style="margin:0 auto;">
          <i data-lucide="plus"></i> הוסף לקוח ראשון</button>` : ''}
      </div>`;
    lucide.createIcons(); return;
  }

  el.innerHTML = list.map(c => {
    const st     = STATUS[c.status]   || STATUS.waiting;
    const sv     = SERVICE[c.service] || SERVICE.home;
    const urgent = c.priority === 'urgent';
    const devIcon = DEVICE_ICON[c.device] || 'cpu';
    const dateStr = fmtDate(c.date || c.createdAt);

    const nextBtn = c.status === 'waiting'
      ? `<button class="act-btn" onclick="changeStatus('${c.id}','active')" title="העבר לטיפול"><i data-lucide="play-circle"></i></button>`
      : c.status === 'active'
      ? `<button class="act-btn green" onclick="changeStatus('${c.id}','done')" title="סמן כהושלם"><i data-lucide="check-circle-2"></i></button>`
      : c.status === 'done'
      ? `<button class="act-btn" style="opacity:.55" onclick="changeStatus('${c.id}','waiting')" title="החזר לתור"><i data-lucide="rotate-ccw"></i></button>`
      : '';

    return `
    <div class="card${urgent?' urgent':''}">
      <div class="card-top">
        <div class="card-left">
          <div class="card-name">
            ${urgent ? '<div class="urgent-dot"></div>' : ''}
            ${esc(c.name)}
          </div>
          <a class="card-phone" href="tel:${esc(c.phone)}">
            <i data-lucide="phone"></i>${esc(c.phone)}
          </a>
        </div>
        <div class="card-badges">
          <span class="badge" style="background:${st.bg};color:${st.color};">
            <i data-lucide="${st.icon}"></i>${st.label}
          </span>
          <span class="badge" style="background:${sv.bg};color:${sv.color};">
            <i data-lucide="${sv.icon}"></i>${sv.label}
          </span>
        </div>
      </div>

      ${c.device ? `
      <div class="card-device">
        <i data-lucide="${devIcon}"></i>${esc(c.device)}
      </div>` : ''}

      ${c.issue ? `<div class="card-issue"><i data-lucide="wrench"></i>${esc(c.issue)}</div>` : ''}
      ${c.notes ? `<div class="card-notes"><i data-lucide="sticky-note"></i>${esc(c.notes)}</div>` : ''}

      <div class="card-bottom">
        <span class="card-date"><i data-lucide="calendar"></i>${dateStr}</span>
        <div class="card-actions">
          ${nextBtn}
          <button class="act-btn" onclick="openEdit('${c.id}')" title="עריכה"><i data-lucide="pencil"></i></button>
          <button class="act-btn red" onclick="askDelete('${c.id}','${esc(c.name)}')" title="מחיקה"><i data-lucide="trash-2"></i></button>
        </div>
      </div>
    </div>`;
  }).join('');

  lucide.createIcons();
}

function fmtDate(v) {
  if (!v) return '';
  return new Date(v).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeForm(); closeDelModal(); }
});
</script>
</body>
</html>
